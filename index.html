<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cafeteira Lá de Casa</title>

<style>
body {
  font-family: Arial;
  background: #ffe6f0;
  margin: 0;
}

header {
  background: #d81b60;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #d81b60;
  color: white;
  border: none;
  margin-top: 5px;
  cursor: pointer;
}

.produto {
  padding: 10px;
  margin: 5px 0;
  background: #f8bbd0;
  cursor: pointer;
}

.total {
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<header>
☕ Cafeteira Lá de Casa
</header>

<div class="container">

<!-- ADMIN -->
<div class="box">
<h3>Admin - Produtos</h3>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">

<button onclick="addProduto()">Adicionar</button>

<div id="listaAdmin"></div>
</div>

<!-- LOJA -->
<div class="box">
<h3>Loja</h3>

<div id="listaLoja"></div>

<hr>

<h3>Carrinho</h3>
<div id="carrinho"></div>

<p class="total">Total: R$ <span id="total">0</span></p>

<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let carrinho = [];
let total = 0;

function salvar() {
  localStorage.setItem("produtos", JSON.stringify(produtos));
}

function render() {

  // ADMIN
  let admin = "";
  produtos.forEach((p, i) => {
    admin += `
      <div>
        ${p.nome} - R$ ${p.preco}
        <button onclick="remover(${i})">Apagar</button>
      </div>
    `;
  });
  document.getElementById("listaAdmin").innerHTML = admin;

  // LOJA
  let loja = "";
  produtos.forEach((p, i) => {
    loja += `
      <div class="produto" onclick="add(${i})">
        ${p.nome} - R$ ${p.preco}
      </div>
    `;
  });
  document.getElementById("listaLoja").innerHTML = loja;
}

function addProduto() {
  let nome = document.getElementById("nome").value;
  let preco = parseFloat(document.getElementById("preco").value);

  if (!nome || !preco) return;

  produtos.push({ nome, preco });
  salvar();
  render();
}

function remover(i) {
  produtos.splice(i, 1);
  salvar();
  render();
}

function add(i) {
  carrinho.push(produtos[i]);
  total += produtos[i].preco;

  document.getElementById("total").innerText = total;

  let c = "";
  carrinho.forEach(p => {
    c += `<div>${p.nome} - R$ ${p.preco}</div>`;
  });

  document.getElementById("carrinho").innerHTML = c;
}

function finalizar() {
  alert("Total: R$ " + total);
  carrinho = [];
  total = 0;
  document.getElementById("carrinho").innerHTML = "";
  document.getElementById("total").innerText = 0;
}

render();

</script>

</body>
</html>
