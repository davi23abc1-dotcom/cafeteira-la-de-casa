<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafeteira Lá de Casa</title>

<style>
body {
  font-family: Arial;
  background: #ffe6f0;
  margin: 0;
}

header {
  background: #d81b60;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  min-width: 280px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #d81b60;
  color: white;
  border: none;
  margin-top: 5px;
  cursor: pointer;
  border-radius: 5px;
}

.produto {
  padding: 10px;
  margin: 5px 0;
  background: #f8bbd0;
  cursor: pointer;
  border-radius: 5px;
}

.produto:hover {
  background: #f48fb1;
}

.total {
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<header>
☕ Cafeteira Lá de Casa
</header>

<div class="container">

<!-- ADMIN -->
<div class="box">
<h3>Admin - Produtos</h3>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">

<button onclick="addProduto()">Adicionar Produto (estoque 10)</button>

<div id="listaAdmin"></div>
</div>

<!-- LOJA -->
<div class="box">
<h3>Loja</h3>

<div id="listaLoja"></div>

<hr>

<h3>Carrinho</h3>
<div id="carrinho"></div>

<p class="total">Total: R$ <span id="total">0</span></p>

<button onclick="finalizar()">Finalizar Venda</button>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let carrinho = [];
let total = 0;

function salvar() {
  localStorage.setItem("produtos", JSON.stringify(produtos));
}

function render() {

  // ADMIN
  let adminHTML = "";
  produtos.forEach((p, i) => {
    adminHTML += `
      <div>
        ${p.nome} - R$ ${p.preco} | Estoque: ${p.qtd}
        <button onclick="remover(${i})">Apagar</button>
      </div>
    `;
  });
  document.getElementById("listaAdmin").innerHTML = adminHTML;

  // LOJA
  let lojaHTML = "";
  produtos.forEach((p, i) => {
    lojaHTML += `
      <div class="produto" onclick="add(${i})">
        ${p.nome} - R$ ${p.preco} | Estoque: ${p.qtd}
      </div>
    `;
  });
  document.getElementById("listaLoja").innerHTML = lojaHTML;
}

function addProduto() {
  let nome = document.getElementById("nome").value;
  let preco = parseFloat(document.getElementById("preco").value);

  if (!nome || !preco) return;

  produtos.push({
    nome,
    preco,
    qtd: 10
  });

  salvar();
  render();
}

function remover(i) {
  produtos.splice(i, 1);
  salvar();
  render();
}

function add(i) {

  if (produtos[i].qtd <= 0) {
    alert("Sem estoque!");
    return;
  }

  carrinho.push(produtos[i]);

  produtos[i].qtd -= 1;

  total += produtos[i].preco;

  salvar();
  render();

  document.getElementById("total").innerText = total;

  let carrinhoHTML = "";
  carrinho.forEach(p => {
    carrinhoHTML += `<div>${p.nome} - R$ ${p.preco}</div>`;
  });

  document.getElementById("carrinho").innerHTML = carrinhoHTML;
}

function finalizar() {
  alert("Venda finalizada! Total: R$ " + total);

  carrinho = [];
  total = 0;

  document.getElementById("carrinho").innerHTML = "";
  document.getElementById("total").innerText = 0;
}

render();

</script>

</body>
</html>
