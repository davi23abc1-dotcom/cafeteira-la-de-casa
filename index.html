<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafeteira Lá de Casa</title>

<style>
body{font-family:Arial;background:#ffe6f0;margin:0;}
header{background:#d81b60;color:#fff;padding:15px;text-align:center;position:relative;}
.settings-btn{position:absolute;right:15px;top:10px;background:#fff;color:#d81b60;border:none;padding:8px;border-radius:50%;cursor:pointer;}

.container{display:flex;gap:20px;padding:20px;flex-wrap:wrap;}
.box{background:#fff;padding:15px;border-radius:10px;flex:1;min-width:280px;}

input,select{width:100%;padding:8px;margin:5px 0;}
button{width:100%;padding:10px;background:#d81b60;color:#fff;border:none;margin-top:5px;border-radius:5px;cursor:pointer;}

.produto{background:#f8bbd0;padding:8px;margin:5px 0;border-radius:5px;cursor:pointer;}
.admin{display:none;}
.total{font-weight:bold;}
.small{font-size:12px;color:#555;}
</style>
</head>

<body>

<header>
☕ Cafeteira Lá de Casa
<button class="settings-btn" onclick="toggleAdmin()">⚙</button>
</header>

<div class="container">

<!-- ADMIN -->
<div class="box admin" id="adminBox">

<h3>⚙ Produto</h3>

<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço venda">
<input id="custo" placeholder="Custo">
<input id="estoque" placeholder="Estoque">

<button onclick="addProduto()">Adicionar</button>

<div id="listaAdmin"></div>

<hr>

<h3>💳 Caixa do Dia</h3>

<div class="small" id="relatorio"></div>

</div>

<!-- LOJA -->
<div class="box">

<h3>Loja</h3>

<div id="loja"></div>

<hr>

<h3>Pagamento</h3>
<select id="pagamento">
  <option>Pix</option>
  <option>Dinheiro</option>
  <option>Cartão</option>
</select>

<h3>Carrinho</h3>
<div id="carrinho"></div>

<p class="total">Total: R$ <span id="total">0</span></p>
<p class="small">Lucro: R$ <span id="lucro">0</span></p>

<button onclick="finalizar()">Finalizar Venda</button>

</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let vendas = JSON.parse(localStorage.getItem("vendas")) || [];
let carrinho = [];
let total = 0;
let lucro = 0;

function salvar(){
  localStorage.setItem("produtos", JSON.stringify(produtos));
  localStorage.setItem("vendas", JSON.stringify(vendas));
}

function toggleAdmin(){
  let a=document.getElementById("adminBox");
  a.style.display = a.style.display==="none"?"block":"none";
}

function addProduto(){
  let nome=document.getElementById("nome").value;
  let preco=parseFloat(document.getElementById("preco").value);
  let custo=parseFloat(document.getElementById("custo").value);
  let estoque=parseInt(document.getElementById("estoque").value)||10;

  produtos.push({nome,preco,custo,qtd:estoque});
  salvar();
  render();
}

function add(i){

  if(produtos[i].qtd<=0){alert("Sem estoque!");return;}

  carrinho.push(produtos[i]);

  produtos[i].qtd--;

  total += produtos[i].preco;
  lucro += (produtos[i].preco - produtos[i].custo);

  salvar();
  render();

  document.getElementById("total").innerText=total;
  document.getElementById("lucro").innerText=lucro;
}

function finalizar(){

  let pagamento=document.getElementById("pagamento").value;

  vendas.push({
    total,
    lucro,
    pagamento,
    data:new Date().toLocaleString()
  });

  salvar();

  alert("Venda finalizada!");

  carrinho=[];
  total=0;
  lucro=0;

  render();
}

function render(){

  // LOJA
  let loja="";
  produtos.forEach((p,i)=>{
    loja+=`<div class="produto" onclick="add(${i})">
    ${p.nome} - R$ ${p.preco} | ${p.qtd}</div>`;
  });

  document.getElementById("loja").innerHTML=loja;

  // ADMIN
  let admin="";
  produtos.forEach((p,i)=>{
    admin+=`<div>
    <b>${p.nome}</b> | venda R$${p.preco} | custo R$${p.custo} | estoque ${p.qtd}
    </div>`;
  });

  document.getElementById("listaAdmin").innerHTML=admin;

  // RELATÓRIO
  let totalDia=0;
  let lucroDia=0;

  let pix=0,din=0,cart=0;

  vendas.forEach(v=>{
    totalDia+=v.total;
    lucroDia+=v.lucro;

    if(v.pagamento==="Pix")pix+=v.total;
    if(v.pagamento==="Dinheiro")din+=v.total;
    if(v.pagamento==="Cartão")cart+=v.total;
  });

  document.getElementById("relatorio").innerHTML=`
    💰 Total vendido: R$ ${totalDia.toFixed(2)}<br>
    📈 Lucro: R$ ${lucroDia.toFixed(2)}<br><br>
    💳 Pix: R$ ${pix.toFixed(2)}<br>
    💵 Dinheiro: R$ ${din.toFixed(2)}<br>
    💳 Cartão: R$ ${cart.toFixed(2)}<br>
  `;
}

render();

</script>

</body>
</html>
