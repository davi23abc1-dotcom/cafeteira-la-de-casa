<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafeteira Lá de Casa</title>

<style>
body {font-family: Arial; background:#ffe6f0; margin:0;}
header {background:#d81b60;color:#fff;padding:15px;text-align:center;position:relative;}
.settings-btn{position:absolute;right:15px;top:10px;background:#fff;color:#d81b60;border:none;padding:8px;border-radius:50%;cursor:pointer;}

.container{display:flex;gap:20px;padding:20px;flex-wrap:wrap;}
.box{background:#fff;padding:15px;border-radius:10px;flex:1;min-width:280px;}

input{width:100%;padding:8px;margin:5px 0;}
button{width:100%;padding:10px;background:#d81b60;color:#fff;border:none;margin-top:5px;border-radius:5px;cursor:pointer;}

.cat{border:2px dashed #d81b60;margin:10px 0;padding:10px;border-radius:10px;}
.produto{background:#f8bbd0;padding:8px;margin:5px 0;border-radius:5px;cursor:pointer;}

.admin{display:none;}
.total{font-weight:bold;}
</style>
</head>

<body>

<header>
☕ Cafeteira Lá de Casa
<button class="settings-btn" onclick="toggleAdmin()">⚙</button>
</header>

<div class="container">

<!-- ADMIN -->
<div class="box admin" id="adminBox">
<h3>⚙ Painel Admin</h3>

<h4>➕ Criar Categoria</h4>
<input id="catNome" placeholder="Nome da categoria">
<button onclick="addCategoria()">Criar Categoria</button>

<hr>

<h4>➕ Produto</h4>
<input id="nome" placeholder="Nome produto">
<input id="preco" placeholder="Preço">
<input id="estoque" placeholder="Estoque">

<select id="catSelect"></select>

<button onclick="addProduto()">Adicionar Produto</button>

<div id="listaAdmin"></div>
</div>

<!-- LOJA -->
<div class="box">
<h3>Loja</h3>

<div id="loja"></div>

<hr>

<h3>Carrinho</h3>
<div id="carrinho"></div>

<p class="total">Total: R$ <span id="total">0</span></p>

<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>

let categorias = JSON.parse(localStorage.getItem("cats")) || [];
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let carrinho = [];
let total = 0;

function salvar(){
  localStorage.setItem("cats", JSON.stringify(categorias));
  localStorage.setItem("produtos", JSON.stringify(produtos));
}

function toggleAdmin(){
  let a=document.getElementById("adminBox");
  a.style.display = a.style.display==="none"?"block":"none";
}

function addCategoria(){
  let nome=document.getElementById("catNome").value;
  if(!nome) return;

  categorias.push({nome});
  salvar();
  render();
}

function addProduto(){
  let nome=document.getElementById("nome").value;
  let preco=parseFloat(document.getElementById("preco").value);
  let estoque=parseInt(document.getElementById("estoque").value)||10;
  let cat=document.getElementById("catSelect").value;

  produtos.push({nome,preco,qtd:estoque,cat});
  salvar();
  render();
}

function add(i){
  if(produtos[i].qtd<=0){alert("Sem estoque!");return;}
  carrinho.push(produtos[i]);
  produtos[i].qtd--;
  total+=produtos[i].preco;
  salvar();
  render();
  document.getElementById("total").innerText=total;
}

function render(){

  // SELECT CATEGORIAS
  let sel="";
  categorias.forEach(c=>{
    sel+=`<option value="${c.nome}">${c.nome}</option>`;
  });
  document.getElementById("catSelect").innerHTML=sel;

  // LOJA
  let loja="";
  categorias.forEach(c=>{
    loja+=`<h4 class="cat">${c.nome}</h4>`;

    produtos.filter(p=>p.cat===c.nome).forEach((p,i)=>{
      loja+=`<div class="produto" onclick="add(${produtos.indexOf(p)})">
      ${p.nome} - R$ ${p.preco} | ${p.qtd}</div>`;
    });
  });

  document.getElementById("loja").innerHTML=loja;

  // ADMIN
  let admin="";
  categorias.forEach((c,i)=>{
    admin+=`<div class="cat">${c.nome}
    <button onclick="delCat(${i})">Apagar categoria</button></div>`;
  });

  document.getElementById("listaAdmin").innerHTML=admin;
}

function delCat(i){
  let nome=categorias[i].nome;
  categorias.splice(i,1);
  produtos=produtos.filter(p=>p.cat!==nome);
  salvar();
  render();
}

function finalizar(){
  alert("Total: R$ "+total);
  carrinho=[];
  total=0;
  document.getElementById("carrinho").innerHTML="";
  document.getElementById("total").innerText=0;
}

render();

</script>

</body>
</html>
