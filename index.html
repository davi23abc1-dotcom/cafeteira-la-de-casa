<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafeteira Lá de Casa</title>

<style>
body {
  font-family: Arial;
  background: #ffe6f0;
  margin: 0;
}

header {
  background: #d81b60;
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
}

.settings-btn {
  position: absolute;
  right: 15px;
  top: 10px;
  background: white;
  color: #d81b60;
  border: none;
  padding: 8px;
  border-radius: 50%;
  cursor: pointer;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  min-width: 280px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #d81b60;
  color: white;
  border: none;
  margin-top: 5px;
  cursor: pointer;
  border-radius: 5px;
}

.produto {
  padding: 10px;
  margin: 5px 0;
  background: #f8bbd0;
  cursor: pointer;
  border-radius: 5px;
}

.total {
  font-weight: bold;
}

.admin {
  display: none;
}
</style>
</head>

<body>

<header>
☕ Cafeteira Lá de Casa
<button class="settings-btn" onclick="toggleAdmin()">⚙</button>
</header>

<div class="container">

<!-- ADMIN -->
<div class="box admin" id="adminBox">
<h3>⚙ Admin</h3>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="estoque" placeholder="Estoque">

<select id="categoria">
  <option value="salgados">Salgados</option>
  <option value="doces">Doces</option>
  <option value="bebidas">Bebidas</option>
</select>

<button onclick="addProduto()">Adicionar Produto</button>

<div id="listaAdmin"></div>
</div>

<!-- LOJA -->
<div class="box">
<h3>Loja</h3>

<select id="filtro" onchange="render()">
  <option value="todos">Todos</option>
  <option value="salgados">Salgados</option>
  <option value="doces">Doces</option>
  <option value="bebidas">Bebidas</option>
</select>

<div id="listaLoja"></div>

<hr>

<h3>Carrinho</h3>
<div id="carrinho"></div>

<p class="total">Total: R$ <span id="total">0</span></p>

<button onclick="finalizar()">Finalizar Venda</button>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let carrinho = [];
let total = 0;

function salvar(){
  localStorage.setItem("produtos", JSON.stringify(produtos));
}

function toggleAdmin(){
  let a = document.getElementById("adminBox");
  a.style.display = a.style.display === "none" ? "block" : "none";
}

function addProduto(){

  let nome = document.getElementById("nome").value;
  let preco = parseFloat(document.getElementById("preco").value);
  let estoque = parseInt(document.getElementById("estoque").value) || 10;
  let categoria = document.getElementById("categoria").value;

  if(!nome || !preco) return;

  produtos.push({
    nome,
    preco,
    qtd: estoque,
    cat: categoria
  });

  salvar();
  render();
}

function render(){

  let filtro = document.getElementById("filtro").value;

  let lista = produtos.filter(p => {
    return filtro === "todos" || p.cat === filtro;
  });

  // LOJA
  let lojaHTML = "";
  lista.forEach((p,i) => {
    lojaHTML += `
      <div class="produto" onclick="add(${produtos.indexOf(p)})">
        ${p.nome} - R$ ${p.preco} | Estoque: ${p.qtd}
      </div>
    `;
  });

  document.getElementById("listaLoja").innerHTML = lojaHTML;

  // ADMIN
  let adminHTML = "";
  produtos.forEach((p,i) => {
    adminHTML += `
      <div>
        <b>${p.nome}</b> (${p.cat}) - R$ ${p.preco} | ${p.qtd}
        <button onclick="addEstoque(${i})">+1 estoque</button>
        <button onclick="remover(${i})">Apagar</button>
      </div>
    `;
  });

  document.getElementById("listaAdmin").innerHTML = adminHTML;
}

function addEstoque(i){
  produtos[i].qtd++;
  salvar();
  render();
}

function remover(i){
  produtos.splice(i,1);
  salvar();
  render();
}

function add(i){

  if(produtos[i].qtd <= 0){
    alert("Sem estoque!");
    return;
  }

  carrinho.push(produtos[i]);
  produtos[i].qtd--;

  total += produtos[i].preco;

  salvar();
  render();

  document.getElementById("total").innerText = total;

  let c = "";
  carrinho.forEach(p=>{
    c += `<div>${p.nome} - R$ ${p.preco}</div>`;
  });

  document.getElementById("carrinho").innerHTML = c;
}

function finalizar(){
  alert("Total: R$ " + total);
  carrinho = [];
  total = 0;
  document.getElementById("carrinho").innerHTML = "";
  document.getElementById("total").innerText = 0;
}

render();

</script>

</body>
</html>
