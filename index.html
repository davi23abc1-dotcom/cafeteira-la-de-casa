<script>

// PESQUISA MELHORADA
function pesquisarProdutos(){

  let pesquisa =
  document.getElementById("pesquisa")
  .value
  .toLowerCase()
  .trim();

  let resultados = "";

  if(pesquisa === ""){

    document.getElementById(
      "resultadoPesquisa"
    ).innerHTML = "";

    return;
  }

  let encontrados = produtos.filter(p =>
    p.nome.toLowerCase().includes(pesquisa)
  );

  encontrados.forEach((p)=>{

    resultados += `
      <div
      class="produto"
      onclick="adicionarCarrinho(${produtos.indexOf(p)})">

      🔍 ${p.nome}<br>

      💰 R$ ${p.preco.toFixed(2)}<br>

      📦 Estoque: ${p.qtd}

      </div>
    `;
  });

  if(encontrados.length <= 0){

    resultados = `
      <div class="produto">
      Nenhum produto encontrado
      </div>
    `;
  }

  document.getElementById(
    "resultadoPesquisa"
  ).innerHTML = resultados;
}

// APAGAR CATEGORIA
function apagarCategoria(nome){

  let confirmar = confirm(
    "Apagar categoria e todos os produtos?"
  );

  if(!confirmar) return;

  categorias =
  categorias.filter(c => c !== nome);

  produtos =
  produtos.filter(p => p.categoria !== nome);

  salvar();

  render();
}

</script>
