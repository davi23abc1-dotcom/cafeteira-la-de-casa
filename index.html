<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafeteira Lá de Casa</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial;
  background:#fff0f5;
  height:100vh;
  overflow:hidden;
}

header{
  background:#d81b60;
  color:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:22px;
  height:60px;
}

.settings-btn{
  background:white;
  color:#d81b60;
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}

.main{
  display:flex;
  height:calc(100vh - 60px);
}

.sidebar{
  width:260px;
  background:white;
  border-right:2px solid #f3c1d6;
  padding:15px;
  overflow:auto;
}

.content{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:15px;
  gap:10px;
}

.topbar{
  display:flex;
  gap:10px;
}

.topbar input,
.topbar select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.topbar input{
  flex:1;
}

.categorias{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  overflow:auto;
  max-height:180px;
}

.categoria{
  background:#d81b60;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.categoria.ativa{
  background:#880e4f;
}

.produtos{
  flex:1;
  overflow:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
}

.produto{
  background:white;
  border-radius:10px;
  padding:10px;
  border:2px solid #f8bbd0;
  cursor:pointer;
}

.produto:hover{
  background:#ffe6f0;
}

.carrinho{
  background:white;
  border-top:2px solid #f3c1d6;
  padding:10px;
  max-height:260px;
  overflow:auto;
}

.item-carrinho{
  background:#ffe6f0;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}

button{
  border:none;
  border-radius:8px;
  padding:8px;
  cursor:pointer;
}

.btn-remover{
  background:#ff5252;
  color:white;
  margin-top:5px;
  width:100%;
}

.btn-finalizar{
  background:#d81b60;
  color:white;
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
}

.btn-cancelar{
  background:#757575;
  color:white;
  width:100%;
  margin-top:5px;
}

.admin{
  display:none;
}

.admin input,
.admin select{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

.admin button{
  width:100%;
  background:#d81b60;
  color:white;
  margin-bottom:8px;
}

.resumo{
  background:#ffe6f0;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

</style>
</head>

<body>

<header>

☕ Cafeteira Lá de Casa

<button class="settings-btn"
onclick="toggleAdmin()">

⚙

</button>

</header>

<div class="main">

<!-- ADMIN -->
<div class="sidebar admin" id="adminBox">

<h3>⚙ Painel</h3>

<input id="novaCategoria"
placeholder="Nova categoria">

<button onclick="criarCategoria()">
Criar Categoria
</button>

<hr>

<input id="nome"
placeholder="Produto">

<input id="preco"
type="number"
placeholder="Preço">

<input id="custo"
type="number"
placeholder="Custo">

<input id="estoque"
type="number"
placeholder="Estoque">

<select id="categoriaSelect"></select>

<button onclick="addProduto()">
Adicionar Produto
</button>

<hr>

<button onclick="toggleProdutosAdmin()">
📦 Produtos
</button>

<div id="listaAdmin"></div>

<hr>

<div class="resumo"
id="relatorio"></div>

<button onclick="resetarCaixa()">
Resetar Caixa
</button>

</div>

<!-- SISTEMA -->
<div class="content">

<div class="topbar">

<input
id="pesquisa"
placeholder="Pesquisar produto..."
onkeyup="pesquisarProdutos()">

<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

</div>

<div class="categorias"
id="loja"></div>

<div class="produtos"
id="resultadoPesquisa"></div>

<div class="carrinho">

<h3>🛒 Carrinho</h3>

<div id="carrinho"></div>

<h2>
R$ <span id="total">0.00</span>
</h2>

<p>
Lucro:
R$ <span id="lucro">0.00</span>
</p>

<button
class="btn-cancelar"
onclick="cancelarVenda()">

❌ Cancelar Venda

</button>

<button
class="btn-finalizar"
onclick="finalizarVenda()">

Finalizar Venda

</button>

</div>

</div>

</div>

<script>

let categorias =
JSON.parse(localStorage.getItem("categorias")) || [];

let produtos =
JSON.parse(localStorage.getItem("produtos")) || [];

let vendas =
JSON.parse(localStorage.getItem("vendas")) || [];

let carrinho = [];

let abertas = {};

let total = 0;

let lucro = 0;

let adminProdutosVisivel = false;

function salvar(){

localStorage.setItem(
"categorias",
JSON.stringify(categorias)
);

localStorage.setItem(
"produtos",
JSON.stringify(produtos)
);

localStorage.setItem(
"vendas",
JSON.stringify(vendas)
);

}

function toggleAdmin(){

let admin =
document.getElementById("adminBox");

admin.style.display =
admin.style.display === "block"
? "none"
: "block";
}

function criarCategoria(){

let nome =
document.getElementById(
"novaCategoria"
).value;

if(!nome) return;

categorias.push(nome);

salvar();

render();
}

function apagarCategoria(nome){

categorias =
categorias.filter(c=>c!==nome);

produtos =
produtos.filter(
p=>p.categoria!==nome
);

salvar();

render();
}

function addProduto(){

let nome =
document.getElementById("nome").value;

let preco =
parseFloat(
document.getElementById("preco").value
);

let custo =
parseFloat(
document.getElementById("custo").value
);

let estoque =
parseInt(
document.getElementById("estoque").value
);

let categoria =
document.getElementById(
"categoriaSelect"
).value;

if(!nome || !preco || !estoque)
return;

produtos.push({
nome,
preco,
custo,
qtd:estoque,
categoria
});

salvar();

render();
}

function apagarProduto(i){

produtos.splice(i,1);

salvar();

render();
}

function toggleProdutosAdmin(){

adminProdutosVisivel =
!adminProdutosVisivel;

render();
}

function abrirCategoria(nome){

abertas[nome] =
!abertas[nome];

render();
}

function adicionarCarrinho(i){

if(produtos[i].qtd<=0){

alert("Sem estoque");

return;
}

produtos[i].qtd--;

carrinho.push(produtos[i]);

total += produtos[i].preco;

lucro += (
produtos[i].preco -
produtos[i].custo
);

salvar();

atualizarCarrinho();

render();
}

function removerCarrinho(index){

let produto =
carrinho[index];

produto.qtd++;

total -= produto.preco;

lucro -= (
produto.preco -
produto.custo
);

carrinho.splice(index,1);

salvar();

atualizarCarrinho();

render();
}

function cancelarVenda(){

carrinho.forEach((p)=>{

p.qtd++;

});

carrinho = [];

total = 0;

lucro = 0;

atualizarCarrinho();

render();
}

function atualizarCarrinho(){

let html = "";

carrinho.forEach((p,index)=>{

html += `

<div class="item-carrinho">

${p.nome}
- R$ ${p.preco}

<button
class="btn-remover"
onclick="removerCarrinho(${index})">

Remover

</button>

</div>

`;
});

document.getElementById(
"carrinho"
).innerHTML = html;

document.getElementById(
"total"
).innerText =
total.toFixed(2);

document.getElementById(
"lucro"
).innerText =
lucro.toFixed(2);
}

function finalizarVenda(){

if(carrinho.length<=0){

alert("Carrinho vazio");

return;
}

let pagamento =
document.getElementById(
"pagamento"
).value;

vendas.push({
itens:[...carrinho],
total,
lucro,
pagamento,
data:new Date()
.toLocaleString()
});

salvar();

carrinho = [];

total = 0;

lucro = 0;

atualizarCarrinho();

render();

alert("Venda finalizada");
}

function resetarCaixa(){

if(!confirm("Resetar caixa?"))
return;

vendas = [];

salvar();

render();
}

function pesquisarProdutos(){

let pesquisa =
document.getElementById(
"pesquisa"
).value.toLowerCase();

let html = "";

produtos
.filter(p=>
p.nome.toLowerCase()
.includes(pesquisa)
)

.forEach((p)=>{

html += `

<div
class="produto"
onclick="adicionarCarrinho(${produtos.indexOf(p)})">

<b>${p.nome}</b><br>

💰 R$ ${p.preco}<br>

📦 ${p.qtd}

</div>

`;
});

document.getElementById(
"resultadoPesquisa"
).innerHTML = html;
}

function render(){

let categoriasHTML = "";

categorias.forEach((c)=>{

categoriasHTML += `

<div
class="categoria
${abertas[c] ? 'ativa' : ''}"
onclick="abrirCategoria('${c}')">

${c}

</div>

`;

if(abertas[c]){

produtos
.filter(p=>p.categoria===c)
.forEach((p)=>{

categoriasHTML += `

<div
class="produto"
onclick="adicionarCarrinho(${produtos.indexOf(p)})">

<b>${p.nome}</b><br>

💰 R$ ${p.preco}<br>

📦 ${p.qtd}

</div>

`;
});
}
});

document.getElementById(
"loja"
).innerHTML = categoriasHTML;

let selectHTML = "";

categorias.forEach((c)=>{

selectHTML += `
<option>${c}</option>
`;
});

document.getElementById(
"categoriaSelect"
).innerHTML = selectHTML;

let adminHTML = "";

if(adminProdutosVisivel){

produtos.forEach((p)=>{

adminHTML += `

<div class="produto">

<b>${p.nome}</b><br>

📁 ${p.categoria}<br>

💰 ${p.preco}<br>

📦 ${p.qtd}

<button
onclick="apagarProduto(${produtos.indexOf(p)})">

🗑 Apagar

</button>

</div>

`;
});
}

document.getElementById(
"listaAdmin"
).innerHTML = adminHTML;

let totalDia = 0;

let lucroDia = 0;

let resumo = {};

vendas.forEach((v)=>{

totalDia += v.total;

lucroDia += v.lucro;

v.itens.forEach((i)=>{

if(!resumo[i.nome]){

resumo[i.nome] = 0;
}

resumo[i.nome]++;
});
});

let resumoHTML = "";

for(let nome in resumo){

resumoHTML += `
${nome}: ${resumo[nome]}<br>
`;
}

document.getElementById(
"relatorio"
).innerHTML = `

💰 Vendas:
R$ ${totalDia.toFixed(2)}<br><br>

📈 Lucro:
R$ ${lucroDia.toFixed(2)}<br><br>

🔥 Mais vendidos:<br>

${resumoHTML || "Nenhuma venda"}

`;
}

render();

</script>

</body>
</html>
