<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafeteira Lá de Casa</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffe6f0;
  margin: 0;
  padding: 0;
}

header {
  background: #d81b60;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  min-width: 250px;
}

.produto {
  padding: 10px;
  margin: 5px 0;
  background: #f8bbd0;
  cursor: pointer;
  border-radius: 5px;
}

.produto:hover {
  background: #f48fb1;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  background: #d81b60;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #ad1457;
}

.total {
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
☕ Cafeteira Lá de Casa
</header>

<div class="container">

  <div class="box">
    <h3>Produtos</h3>

    <div class="produto" onclick="add('Café', 5)">Café - R$5</div>
    <div class="produto" onclick="add('Coca Lata', 6)">Coca Lata - R$6</div>
    <div class="produto" onclick="add('Mousse Limão', 8)">Mousse Limão - R$8</div>
    <div class="produto" onclick="add('Sanduíche Especial', 18)">Sanduíche Especial - R$18</div>

  </div>

  <div class="box">
    <h3>Carrinho</h3>

    <div id="carrinho"></div>

    <p class="total">Total: R$ <span id="total">0</span></p>

    <button onclick="finalizar()">Finalizar Venda (Pix)</button>
  </div>

</div>

<script>
let total = 0;

function add(nome, preco){
  const carrinho = document.getElementById("carrinho");

  const item = document.createElement("div");
  item.innerHTML = nome + " - R$ " + preco;

  carrinho.appendChild(item);

  total += preco;
  document.getElementById("total").innerText = total;
}

function finalizar(){
  alert("Venda finalizada! Total: R$ " + total);
  document.getElementById("carrinho").innerHTML = "";
  total = 0;
  document.getElementById("total").innerText = 0;
}
</script>

</body>
</html>
