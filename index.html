<style>

.categorias-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

.categoria{
  background:#d81b60;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:180px;
  font-size:14px;
  font-weight:bold;
  box-sizing:border-box;
}

.btn-excluir-cat{
  background:#ff5252;
  width:auto;
  padding:3px 8px;
  font-size:12px;
  border-radius:5px;
  margin-left:10px;
}

</style>

<script>

// SUBSTITUA SOMENTE A FUNÇÃO render() POR ESTA

function render(){

  // SELECT
  let selectHTML = "";

  categorias.forEach((c)=>{

    selectHTML += `
      <option>${c}</option>
    `;
  });

  document.getElementById(
    "categoriaSelect"
  ).innerHTML = selectHTML;

  // LOJA
  let lojaHTML = `
    <div class="categorias-grid">
  `;

  categorias.forEach((categoria)=>{

    lojaHTML += `
      <div class="categoria"
      onclick="toggleCategoria('${categoria}')">

      <span>${categoria}</span>

      <button
      class="btn-excluir-cat"
      onclick="event.stopPropagation();
      apagarCategoria('${categoria}')">

      ✖

      </button>

      </div>
    `;

    if(abertas[categoria]){

      lojaHTML += `
        <div style="
        width:100%;
        margin-bottom:15px;
        ">
      `;

      produtos
      .filter(p =>
        p.categoria === categoria
      )

      .forEach((p)=>{

        lojaHTML += `
          <div class="produto"
          onclick="adicionarCarrinho(${produtos.indexOf(p)})">

          <b>${p.nome}</b><br>

          💰 R$ ${p.preco}<br>

          📦 Estoque: ${p.qtd}

          </div>
        `;
      });

      lojaHTML += `</div>`;
    }
  });

  lojaHTML += `</div>`;

  document.getElementById(
    "loja"
  ).innerHTML = lojaHTML;

  // ADMIN
  let adminHTML = "";

  produtos.forEach((p)=>{

    adminHTML += `
      <div class="produto">

      <b>${p.nome}</b><br>

      📁 ${p.categoria}<br>

      💰 Venda:
      R$ ${p.preco}<br>

      🧾 Custo:
      R$ ${p.custo}<br>

      📦 ${p.qtd}<br><br>

      <button
      onclick="maisEstoque(${produtos.indexOf(p)})">

      + Estoque

      </button>

      <button
      onclick="apagarProduto(${produtos.indexOf(p)})">

      🗑 Apagar

      </button>

      </div>
    `;
  });

  document.getElementById(
    "listaAdmin"
  ).innerHTML = adminHTML;

  // RELATÓRIO
  let totalDia = 0;

  let lucroDia = 0;

  let pix = 0;

  let dinheiro = 0;

  let cartao = 0;

  vendas.forEach(v=>{

    totalDia += v.total;

    lucroDia += v.lucro;

    if(v.pagamento === "Pix")
      pix += v.total;

    if(v.pagamento === "Dinheiro")
      dinheiro += v.total;

    if(v.pagamento === "Cartão")
      cartao += v.total;
  });

  document.getElementById(
    "relatorio"
  ).innerHTML = `

    💰 Vendas:
    R$ ${totalDia.toFixed(2)}<br><br>

    📈 Lucro:
    R$ ${lucroDia.toFixed(2)}<br><br>

    💳 Pix:
    R$ ${pix.toFixed(2)}<br>

    💵 Dinheiro:
    R$ ${dinheiro.toFixed(2)}<br>

    💳 Cartão:
    R$ ${cartao.toFixed(2)}<br><br>

    🧾 Total vendas:
    ${vendas.length}

  `;
}

</script>
